<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전기기사 필기 퀴즈</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --accent: #4f8ef7;
    --accent2: #7c5cfc;
    --correct: #22c55e;
    --wrong: #ef4444;
    --text: #e8eaf6;
    --muted: #7b82a8;
    --border: rgba(255,255,255,0.08);
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 16px 60px;
  }

  /* ── 헤더 ── */
  header {
    width: 100%;
    max-width: 720px;
    padding: 40px 0 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .badge {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    background: rgba(79,142,247,0.12);
    padding: 4px 14px;
    border-radius: 99px;
  }
  h1 {
    font-size: clamp(22px, 5vw, 32px);
    font-weight: 700;
    text-align: center;
    line-height: 1.3;
    background: linear-gradient(135deg, #e8eaf6 30%, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle {
    font-size: 14px;
    color: var(--muted);
    text-align: center;
  }

  /* ── 진행 바 ── */
  .progress-wrap {
    width: 100%;
    max-width: 720px;
    margin-bottom: 24px;
  }
  .progress-meta {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .progress-bar {
    height: 4px;
    background: var(--surface2);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 99px;
    transition: width 0.4s ease;
  }

  /* ── 카드 ── */
  .card {
    width: 100%;
    max-width: 720px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px 28px 28px;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
  }
  .q-number {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 14px;
  }
  .q-category {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    color: var(--accent2);
    background: rgba(124,92,252,0.12);
    padding: 3px 10px;
    border-radius: 99px;
    margin-bottom: 14px;
  }
  .q-text {
    font-size: 17px;
    font-weight: 500;
    line-height: 1.7;
    margin-bottom: 28px;
    word-break: keep-all;
  }

  /* ── 선택지 ── */
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 16px;
    background: var(--surface2);
    border: 1.5px solid transparent;
    border-radius: 10px;
    cursor: pointer;
    transition: border-color 0.18s, background 0.18s, transform 0.12s;
    font-size: 14px;
    line-height: 1.6;
    word-break: keep-all;
    text-align: left;
  }
  .opt:hover:not(.disabled) {
    border-color: var(--accent);
    background: rgba(79,142,247,0.07);
    transform: translateX(3px);
  }
  .opt-num {
    min-width: 24px;
    height: 24px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    flex-shrink: 0;
    margin-top: 1px;
    transition: background 0.18s, color 0.18s;
  }
  .opt.correct {
    border-color: var(--correct);
    background: rgba(34,197,94,0.08);
  }
  .opt.correct .opt-num { background: var(--correct); color: #fff; }
  .opt.wrong {
    border-color: var(--wrong);
    background: rgba(239,68,68,0.08);
  }
  .opt.wrong .opt-num { background: var(--wrong); color: #fff; }
  .opt.disabled { cursor: default; }

  /* ── 해설 ── */
  .explanation {
    display: none;
    margin-top: 20px;
    padding: 18px 20px;
    background: rgba(79,142,247,0.06);
    border-left: 3px solid var(--accent);
    border-radius: 0 10px 10px 0;
    font-size: 14px;
    line-height: 1.8;
    color: #c5cde8;
    word-break: keep-all;
  }
  .explanation.show { display: block; animation: fadeIn 0.3s ease; }
  .explanation strong { color: var(--accent); font-weight: 700; }

  /* ── 버튼 ── */
  .btn-wrap { display: flex; gap: 10px; margin-top: 24px; }
  .btn {
    flex: 1;
    padding: 14px 0;
    border-radius: 10px;
    border: none;
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.12s;
  }
  .btn:active { transform: scale(0.97); }
  .btn-next {
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    color: #fff;
  }
  .btn-next:disabled { opacity: 0.3; cursor: default; }
  .btn-restart {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }

  /* ── 결과 화면 ── */
  .result {
    display: none;
    width: 100%;
    max-width: 720px;
    text-align: center;
  }
  .result.show { display: block; animation: fadeIn 0.5s ease; }
  .score-circle {
    width: 140px; height: 140px;
    border-radius: 50%;
    border: 5px solid var(--accent);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    margin: 0 auto 24px;
    background: var(--surface);
  }
  .score-num { font-size: 40px; font-weight: 700; color: var(--accent); }
  .score-label { font-size: 13px; color: var(--muted); }
  .result-msg { font-size: 20px; font-weight: 700; margin-bottom: 10px; }
  .result-sub { font-size: 14px; color: var(--muted); margin-bottom: 32px; }
  .result-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 32px;
  }
  .result-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 12px;
  }
  .result-item-val { font-size: 26px; font-weight: 700; }
  .result-item-key { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .c-green { color: var(--correct); }
  .c-red   { color: var(--wrong); }
  .c-blue  { color: var(--accent); }

  @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }

  @media (max-width: 480px) {
    .card { padding: 22px 16px 20px; }
    .q-text { font-size: 15px; }
    .opt { font-size: 13px; padding: 12px 13px; }
  }
</style>
</head>
<body>

<header>
  <span class="badge">전기기사 필기</span>
  <h1>전기기사 필기 핵심 퀴즈</h1>
  <p class="subtitle">4지선다 · 즉시 해설 · 과목별 문제</p>
</header>

<div class="progress-wrap">
  <div class="progress-meta">
    <span id="prog-text">문제 1 / 10</span>
    <span id="prog-pct">0%</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
</div>

<!-- 퀴즈 카드 -->
<div class="card" id="quiz-card">
  <div class="q-number" id="q-number">Q01</div>
  <span class="q-category" id="q-category"></span>
  <p class="q-text" id="q-text"></p>
  <div class="options" id="options"></div>
  <div class="explanation" id="explanation"></div>
  <div class="btn-wrap">
    <button class="btn btn-next" id="btn-next" disabled onclick="nextQuestion()">다음 문제 →</button>
  </div>
</div>

<!-- 결과 화면 -->
<div class="result" id="result">
  <div class="score-circle">
    <span class="score-num" id="res-score">0</span>
    <span class="score-label">/ 10</span>
  </div>
  <p class="result-msg" id="res-msg"></p>
  <p class="result-sub" id="res-sub"></p>
  <div class="result-grid">
    <div class="result-item"><div class="result-item-val c-green" id="res-correct">0</div><div class="result-item-key">정답</div></div>
    <div class="result-item"><div class="result-item-val c-red"   id="res-wrong">0</div><div class="result-item-key">오답</div></div>
    <div class="result-item"><div class="result-item-val c-blue"  id="res-pct">0%</div><div class="result-item-key">정답률</div></div>
  </div>
  <div class="btn-wrap" style="max-width:360px;margin:0 auto">
    <button class="btn btn-restart" onclick="restart()">🔄 다시 풀기</button>
    <button class="btn btn-next" onclick="share()">🔗 공유하기</button>
  </div>
</div>

<script>
const QUESTIONS = [
  {
    category: "전기자기학",
    text: "진공 중에서 두 점전하 사이에 작용하는 힘은 두 전하의 곱에 비례하고 거리의 제곱에 반비례한다. 이를 나타내는 법칙은?",
    options: ["패러데이 법칙", "쿨롱의 법칙", "앙페르 법칙", "가우스 법칙"],
    answer: 1,
    explanation: "<strong>쿨롱의 법칙</strong>: F = k·Q₁Q₂/r² 로 표현되며, 두 점전하 사이의 정전기력은 두 전하량의 곱에 비례하고 거리의 제곱에 반비례합니다. 비례상수 k = 9×10⁹ N·m²/C² 입니다."
  },
  {
    category: "전기자기학",
    text: "자기장 내에서 도체에 전류가 흐를 때 도체가 받는 힘의 방향을 결정하는 법칙은?",
    options: ["오른손 법칙", "렌츠의 법칙", "플레밍의 왼손 법칙", "플레밍의 오른손 법칙"],
    answer: 2,
    explanation: "<strong>플레밍의 왼손 법칙</strong>: 전동기(모터)의 원리로, 왼손의 검지(자기장 B), 중지(전류 I), 엄지(힘 F) 방향을 나타냅니다. 플레밍의 오른손 법칙은 발전기(기전력 방향)에 사용합니다."
  },
  {
    category: "회로이론",
    text: "저항 R₁=6Ω, R₂=3Ω이 병렬 연결되어 있을 때 합성 저항은?",
    options: ["9Ω", "3Ω", "2Ω", "1.5Ω"],
    answer: 2,
    explanation: "<strong>병렬 합성 저항</strong>: 1/R = 1/R₁ + 1/R₂ = 1/6 + 1/3 = 1/6 + 2/6 = 3/6 = 1/2 → R = <strong>2Ω</strong>. 두 저항의 병렬합성은 (R₁×R₂)/(R₁+R₂) = (6×3)/(6+3) = 18/9 = 2Ω 으로도 계산할 수 있습니다."
  },
  {
    category: "회로이론",
    text: "RLC 직렬 공진 회로에서 공진 주파수 f₀를 구하는 식은?",
    options: [
      "f₀ = 2π√(LC)",
      "f₀ = 1/(2π√(LC))",
      "f₀ = √(LC)/2π",
      "f₀ = 2π/(√LC)"
    ],
    answer: 1,
    explanation: "<strong>직렬 공진 주파수</strong>: 유도 리액턴스 XL = 용량 리액턴스 XC일 때 공진이 발생합니다. ωL = 1/ωC → ω² = 1/LC → f₀ = <strong>1/(2π√LC)</strong>. 공진 시 임피던스는 최소(= R)가 되어 전류가 최대로 흐릅니다."
  },
  {
    category: "전력공학",
    text: "송전선의 코로나 발생을 억제하는 가장 효과적인 방법은?",
    options: [
      "송전 전압을 낮춘다",
      "전선의 굵기를 가늘게 한다",
      "복도체(다도체)를 사용한다",
      "가공지선을 설치한다"
    ],
    answer: 2,
    explanation: "<strong>복도체(다도체) 사용</strong>: 전선의 등가 반지름을 크게 하여 전선 표면의 전위 기울기(전계 강도)를 낮춰 코로나 발생을 억제합니다. 복도체는 코로나 억제 외에도 인덕턴스 감소, 송전 용량 증대 효과가 있습니다."
  },
  {
    category: "전력공학",
    text: "변압기에서 퍼센트 임피던스(%Z)가 작을수록 나타나는 현상은?",
    options: [
      "단락전류가 작아진다",
      "전압 변동률이 커진다",
      "단락전류가 커진다",
      "철손이 증가한다"
    ],
    answer: 2,
    explanation: "<strong>%Z와 단락전류의 관계</strong>: 단락전류 Is = In / (%Z/100) 이므로 %Z가 작을수록 단락전류가 <strong>커집니다</strong>. %Z가 크면 단락전류가 작아져 보호 측면에서 유리하지만, 전압 변동률은 증가합니다."
  },
  {
    category: "전기기기",
    text: "3상 유도전동기에서 슬립(slip) s의 정의로 옳은 것은?",
    options: [
      "s = (동기속도 - 회전자속도) / 회전자속도",
      "s = (회전자속도 - 동기속도) / 동기속도",
      "s = (동기속도 - 회전자속도) / 동기속도",
      "s = 회전자속도 / 동기속도"
    ],
    answer: 2,
    explanation: "<strong>슬립(slip)</strong>: s = (Ns - N) / Ns × 100(%). 여기서 Ns는 동기속도, N은 실제 회전자 속도입니다. 무부하 시 s≈0, 전부하 시 s=0.02~0.05(2~5%), 정지 시 s=1 입니다."
  },
  {
    category: "전기기기",
    text: "직류 분권 전동기의 속도 제어 방법이 아닌 것은?",
    options: [
      "계자 제어법",
      "전압 제어법",
      "저항 제어법",
      "주파수 제어법"
    ],
    answer: 3,
    explanation: "<strong>주파수 제어법</strong>은 교류 전동기(특히 유도전동기)의 속도 제어 방법입니다. 직류 전동기 속도 제어는 ① <strong>계자 제어</strong>(자속 변화), ② <strong>전압 제어</strong>(전원 전압 변화), ③ <strong>저항 제어</strong>(전기자 회로 저항 삽입) 3가지가 사용됩니다."
  },
  {
    category: "전기설비기술기준",
    text: "저압 옥내 배선의 전선 최소 굵기(단면적)는 연동선 기준으로 얼마 이상이어야 하는가?",
    options: ["1.5mm²", "2.5mm²", "4mm²", "6mm²"],
    answer: 1,
    explanation: "<strong>저압 옥내 배선 최소 굵기</strong>: 전기설비기술기준에 따라 저압 옥내 배선에 사용하는 연동선(구리)의 단면적은 <strong>2.5mm²</strong> 이상이어야 합니다. 단, 제어회로 등 특수 용도의 경우 1.5mm²까지 허용됩니다."
  },
  {
    category: "전기설비기술기준",
    text: "접지공사의 종류 중 제1종 접지공사의 접지저항 기준은?",
    options: ["10Ω 이하", "100Ω 이하", "300Ω 이하", "500Ω 이하"],
    answer: 0,
    explanation: "<strong>접지공사 종류 및 기준</strong>: 제1종: <strong>10Ω 이하</strong> (고압·특고압 기기 외함 등), 제2종: 150/IF Ω 이하 (변압기 중성점), 제3종: 100Ω 이하 (400V 미만 저압 기기), 특별 제3종: 10Ω 이하 (400V 이상 저압 기기)."
  }
];

let current = 0;
let score   = 0;
let answered = false;

function shuffle(arr) {
  return arr.slice().sort(() => Math.random() - 0.5);
}

let shuffled = [];

function init() {
  shuffled = shuffle(QUESTIONS);
  current  = 0;
  score    = 0;
  answered = false;
  document.getElementById('quiz-card').style.display = '';
  document.getElementById('result').classList.remove('show');
  renderQuestion();
}

function renderQuestion() {
  const q = shuffled[current];
  answered = false;

  document.getElementById('q-number').textContent  = `Q${String(current+1).padStart(2,'0')}`;
  document.getElementById('q-category').textContent = q.category;
  document.getElementById('q-text').textContent     = q.text;
  document.getElementById('explanation').className  = 'explanation';
  document.getElementById('btn-next').disabled      = true;
  document.getElementById('btn-next').textContent   =
    current < shuffled.length - 1 ? '다음 문제 →' : '결과 보기 →';

  // 진행 바
  const pct = Math.round((current / shuffled.length) * 100);
  document.getElementById('prog-text').textContent = `문제 ${current+1} / ${shuffled.length}`;
  document.getElementById('prog-pct').textContent  = pct + '%';
  document.getElementById('prog-fill').style.width = pct + '%';

  // 선택지
  const wrap = document.getElementById('options');
  wrap.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.innerHTML = `<span class="opt-num">${i+1}</span><span>${opt}</span>`;
    btn.onclick = () => selectOption(i, btn);
    wrap.appendChild(btn);
  });
}

function selectOption(idx, btn) {
  if (answered) return;
  answered = true;
  const q    = shuffled[current];
  const opts = document.querySelectorAll('.opt');

  opts.forEach(o => o.classList.add('disabled'));
  opts[q.answer].classList.add('correct');

  if (idx === q.answer) {
    score++;
  } else {
    btn.classList.add('wrong');
  }

  const exp = document.getElementById('explanation');
  exp.innerHTML = '💡 <strong>해설</strong><br>' + q.explanation;
  exp.classList.add('show');
  document.getElementById('btn-next').disabled = false;
}

function nextQuestion() {
  current++;
  if (current >= shuffled.length) {
    showResult();
  } else {
    renderQuestion();
  }
}

function showResult() {
  document.getElementById('quiz-card').style.display = 'none';
  const result = document.getElementById('result');
  result.classList.add('show');

  const pct = Math.round((score / shuffled.length) * 100);
  const msgs = [
    [90, '🏆 완벽합니다!', '전기기사 합격을 축하드립니다!'],
    [70, '👍 훌륭해요!', '조금만 더 다듬으면 합격입니다.'],
    [50, '📚 더 분발하세요!', '틀린 문제 위주로 복습해보세요.'],
    [0,  '💪 처음부터 다시!', '기초부터 차근차근 공부해봐요.'],
  ];
  const [,msg, sub] = msgs.find(([t]) => pct >= t);

  document.getElementById('res-score').textContent   = score;
  document.getElementById('res-msg').textContent     = msg;
  document.getElementById('res-sub').textContent     = sub;
  document.getElementById('res-correct').textContent = score;
  document.getElementById('res-wrong').textContent   = shuffled.length - score;
  document.getElementById('res-pct').textContent     = pct + '%';

  document.getElementById('prog-fill').style.width   = '100%';
  document.getElementById('prog-pct').textContent    = '100%';
  document.getElementById('prog-text').textContent   = `완료 ${shuffled.length} / ${shuffled.length}`;
}

function restart() { init(); }

function share() {
  const url = location.href;
  if (navigator.share) {
    navigator.share({ title: '전기기사 필기 퀴즈', url });
  } else {
    navigator.clipboard.writeText(url).then(() => alert('링크가 복사되었습니다!'));
  }
}

init();
</script>
</body>
</html>
